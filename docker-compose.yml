version: '3.8'

services:
  neo4j:
    image: neo4j:5.20.0
    container_name: paper_agent_neo4j
    ports:
      - "7474:7474" # HTTP port for Neo4j Browser
      - "7687:7687" # Bolt port
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: paper_agent_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=paper_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  neo4j_data:
  postgres_data:
